name: 🔨 Xeno Mini CI/CD

# Trigger on push/PR to main branches
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Minimal permissions (security best practice)
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ===========================================
  # PRIMARY JOB: Build & Lint on Node Matrix
  # ===========================================
  build-and-lint:
    name: Build & Lint (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]
      fail-fast: false  # Continue on one failure to see all issues

    steps:
      # 1. Checkout code
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node.js with dependency caching
      - name: 🔧 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # 3. Verify tool versions
      - name: 📋 Display Node & npm Versions
        run: |
          echo "Node version: $(node --version)"
          echo "npm version: $(npm --version)"

      # 4. Install dependencies with verbose logging for debugging
      - name: 📦 Install Dependencies
        run: npm ci --verbose

      # 5. Generate config files from secrets (optional — works without them)
      - name: ⚙️ Prepare Configuration Files
        run: node scripts/prepare-config.js
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # Note: Script handles missing secrets gracefully

      # 6. TypeScript type checking
      - name: 🔍 TypeScript Verification (lint)
        run: npm run lint

      # 7. Production build
      - name: 🏗️ Build Application
        run: npm run build

      # 8. Upload artifacts (only Node 20.x to save storage)
      - name: 📤 Upload Build Artifacts
        if: success() && matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.node-version }}
          path: dist/
          retention-days: 5

      # 9. Report status to PR
      - name: ✅ Build Status Report
        if: always()
        run: |
          STATUS="❌ Failed"
          [ "${{ job.status }}" = "success" ] && STATUS="✅ Passed"
          
          echo "## Xeno Mini CI for Node ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** $STATUS" >> $GITHUB_STEP_SUMMARY
          echo "**Steps:** Install → Config → Lint → Build" >> $GITHUB_STEP_SUMMARY

  # ===========================================
  # SUMMARY JOB: Final Status Check
  # ===========================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: build-and-lint
    if: always()

    steps:
      - name: 📊 Report CI Result
        run: |
          if [ "${{ needs.build-and-lint.result }}" = "success" ]; then
            echo "✅ All checks passed! Ready to merge."
            exit 0
          else
            echo "❌ CI failed. Check logs above."
            exit 1
          fi
