name: Node.js CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
      fail-fast: false

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Display Node and npm versions
      run: |
        node --version
        npm --version

    - name: Install Dependencies
      run: npm ci --verbose

    - name: Prepare Configuration Files
      run: node scripts/prepare-config.js
      env:
        FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    - name: Run TypeScript Verification
      run: npm run lint

    - name: Build Application
      run: npm run build

    - name: Upload Build Artifacts
      if: success() && matrix.node-version == '20.x'
      uses: actions/upload-artifact@v4
      with:
        name: dist-${{ matrix.node-version }}
        path: dist/
        retention-days: 5

    - name: Build Status Summary
      if: always()
      run: |
        echo "## Build Status for Node ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
        echo "✅ Completed" >> $GITHUB_STEP_SUMMARY
