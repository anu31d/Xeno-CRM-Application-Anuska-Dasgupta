name: Xeno Mini CI/CD

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.x
          - 22.x

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Show Versions
        run: |
          node --version
          npm --version

      - name: Install Dependencies
        run: npm ci

      - name: Prepare Config
        run: |
          if [ -f "scripts/prepare-config.js" ]; then
            node scripts/prepare-config.js
          else
            echo "prepare-config.js not found, skipping"
          fi
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Run Lint
        run: npm run lint --if-present

      - name: Build Application
        run: npm run build

      - name: Upload Build Artifact
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: dist-build
          path: dist

  summary:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Report Status
        run: |
          echo "Build completed successfully"
