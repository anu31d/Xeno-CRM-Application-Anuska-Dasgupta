name: 🚀 Xeno CRM CI/CD Pipeline

on:
push:
branches:
- main
- master

pull_request:
branches:
- main
- master

permissions:
contents: read
checks: write
pull-requests: write
pages: write
id-token: write

concurrency:
group: github-pages
cancel-in-progress: true

jobs:

build-and-test:
name: 🔨 Build & Verify (Node ${{ matrix.node-version }})
runs-on: ubuntu-latest

```
strategy:
  fail-fast: false
  matrix:
    node-version:
      - 20.x
      - 22.x

steps:
  - name: 📥 Checkout Repository
    uses: actions/checkout@v4

  - name: 🔧 Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: ${{ matrix.node-version }}
      cache: npm

  - name: 📋 Display Environment Info
    run: |
      echo "Node: $(node --version)"
      echo "npm: $(npm --version)"

  - name: 📦 Install Dependencies
    run: npm ci

  - name: ⚙️ Generate Runtime Config
    run: node scripts/prepare-config.js
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}

  - name: 🔍 Run Lint Checks
    run: npm run lint

  - name: 🏗️ Build Application
    run: npm run build

  - name: 📤 Upload Build Artifact
    if: matrix.node-version == '20.x'
    uses: actions/upload-artifact@v4
    with:
      name: xeno-build
      path: dist/
      retention-days: 7

  - name: 📤 Upload GitHub Pages Artifact
    if: github.ref == 'refs/heads/main' && matrix.node-version == '20.x'
    uses: actions/upload-pages-artifact@v3
    with:
      path: ./dist

  - name: 📝 Build Summary
    if: always()
    run: |
      echo "# Xeno CRM Build Report" >> $GITHUB_STEP_SUMMARY
      echo "" >> $GITHUB_STEP_SUMMARY
      echo "- Node Version: ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
      echo "- Job Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
```

deploy:
name: 🌍 Deploy to GitHub Pages
needs: build-and-test

```
if: github.ref == 'refs/heads/main'

runs-on: ubuntu-latest

environment:
  name: github-pages
  url: ${{ steps.deployment.outputs.page_url }}

permissions:
  pages: write
  id-token: write

steps:
  - name: 🚀 Deploy Website
    id: deployment
    uses: actions/deploy-pages@v4
```

ci-summary:
name: 📊 Pipeline Summary

```
runs-on: ubuntu-latest

needs:
  - build-and-test
  - deploy

if: always()

steps:
  - name: Report Final Status
    run: |
      echo "# Xeno CRM Pipeline Summary" >> $GITHUB_STEP_SUMMARY
      echo "" >> $GITHUB_STEP_SUMMARY
      echo "- Build Result: ${{ needs.build-and-test.result }}" >> $GITHUB_STEP_SUMMARY
      echo "- Deploy Result: ${{ needs.deploy.result }}" >> $GITHUB_STEP_SUMMARY

      if [ "${{ needs.build-and-test.result }}" = "success" ]; then
        echo "✅ Build successful" >> $GITHUB_STEP_SUMMARY
      else
        echo "❌ Build failed" >> $GITHUB_STEP_SUMMARY
      fi
```
